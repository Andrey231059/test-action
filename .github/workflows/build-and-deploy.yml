# Пример: сборка образа → GitHub Container Registry → деплой по SSH на сервер.
#
# Нужные секреты (Settings → Secrets and variables → Actions):
#   SSH_HOST          — хост сервера (например 203.0.113.10 или example.com)
#   SSH_USER / SSH_USERNAME / DEPLOY_USER — логин SSH (достаточно одного секрета)
#   SSH_PRIVATE_KEY   — приватный ключ OpenSSH (содержимое id_rsa / id_ed25519)
#   SSH_PORT            — (опционально) порт SSH, по умолчанию 22
#   GHCR_USERNAME     — логин для docker login на сервере (обычно GitHub username или org)
#   GHCR_TOKEN        — Personal Access Token с правом read:packages (для pull с ghcr.io)
#
# Для пуша в GHCR из job сборки используется встроенный GITHUB_TOKEN (packages: write).

name: Build, push to GHCR, deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name and tag (GHCR — только нижний регистр)
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            APP_NAME=FastAPI Template
            APP_ENV=prod

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # Не используйте имя переменной USER — в GitHub Actions оно уже задано (runner),
      # из‑за этого логин мог не попадать в appleboy/drone-ssh.
      - name: Resolve SSH login
        id: ssh_deploy
        env:
          U1: ${{ secrets.SSH_USER }}
          U2: ${{ secrets.SSH_USERNAME }}
          U3: ${{ secrets.DEPLOY_USER }}
        run: |
          REMOTE_LOGIN="${U1:-${U2:-${U3}}}"
          if [ -z "$REMOTE_LOGIN" ]; then
            echo "::error::Задайте один из секретов: SSH_USER, SSH_USERNAME или DEPLOY_USER (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "remote_login=${REMOTE_LOGIN}" >> "$GITHUB_OUTPUT"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull image and restart container (SSH)
        env:
          REMOTE_LOGIN: ${{ steps.ssh_deploy.outputs.remote_login }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          TAG: ${{ needs.build-and-push.outputs.tag }}
        run: |
          set -euo pipefail
          : "${REMOTE_LOGIN:?remote_login is empty — add SSH_USER, SSH_USERNAME or DEPLOY_USER}"
          : "${SSH_HOST:?SSH_HOST secret is empty}"
          PORT="${SSH_PORT:-22}"
          # Heredoc с отступами в YAML ломает закрывающий EOF — собираем скрипт и передаём в ssh через pipe
          {
            echo 'set -euo pipefail'
            printf 'echo %q | docker login ghcr.io -u %q --password-stdin\n' "$GHCR_TOKEN" "$GHCR_USERNAME"
            printf 'docker pull %q\n' "${IMAGE}:${TAG}"
            echo 'docker rm -f fastapi-app 2>/dev/null || true'
            printf 'docker run -d --name fastapi-app --restart unless-stopped -p 8000:8000 -e APP_VERSION=%q -e APP_ENV=prod %q\n' "$TAG" "${IMAGE}:${TAG}"
            echo 'docker image prune -f'
          } | ssh -o StrictHostKeyChecking=accept-new -p "${PORT}" "${REMOTE_LOGIN}@${SSH_HOST}" bash -s
